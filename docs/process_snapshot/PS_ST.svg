<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="630px" preserveAspectRatio="none" style="width:673px;height:630px;background:#FFFFFF;" version="1.1" viewBox="0 0 673 630" width="673px" zoomAndPan="magnify"><defs/><g><ellipse cx="466.7808" cy="20" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="107.4806" x="413.0405" y="50"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="87.4806" x="423.0405" y="72.8281">const char path</text><polygon fill="#FFFF00" points="438.3241,106.3441,495.2376,106.3441,507.2376,118.3441,495.2376,130.3441,438.3241,130.3441,426.3241,118.3441,438.3241,106.3441" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="56.9136" x="438.3241" y="122.6121">!(argc == 2)</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="6.2919" x="420.0321" y="115.1211">1</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="6.2919" x="507.2376" y="115.1211">0</text><rect fill="#FFB6C1" height="52.6882" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="153.477" x="297.5239" y="140.3441"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="133.477" x="307.5239" y="163.1722">fprintf(stderr,"usage...")</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="64.8245" x="307.5239" y="179.5163">ARG_FAULT</text><ellipse cx="374.2624" cy="239.0323" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="374.2624" cy="239.0323" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="117.9087" x="500.345" y="140.3441"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="97.9087" x="510.345" y="163.1722">path = *(argv + 1)</text><rect fill="#FFB6C1" height="52.6882" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="156.597" x="481.0008" y="261.1792"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="136.597" x="491.0008" y="284.0073">fprintf(stderr, "usage...")</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="64.8245" x="491.0008" y="300.3514">ARG_FAULT</text><ellipse cx="559.2993" cy="347.0233" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="559.2993" cy="347.0233" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#FFFF00" points="505.3447,211.6882,613.2539,211.6882,625.2539,223.6882,613.2539,235.6882,505.3447,235.6882,493.3447,223.6882,505.3447,211.6882" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="6.2919" x="563.2993" y="247.4471">1</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="107.9092" x="505.3447" y="227.9562">!path || *path == '\0'</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="6.2919" x="625.2539" y="220.4653">0</text><path d="M10,390.0233 L10,577.0835 L349.1622,577.0835 L349.1622,400.0233 L339.1622,390.0233 L10,390.0233" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M339.1622,390.0233 L339.1622,400.0233 L349.1622,400.0233 L339.1622,390.0233" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="201.5912" x="16" y="408.9203">This call is written in tail position.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="279.3573" x="16" y="426.6263">When compiling with optimization on it might</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="185.3152" x="16" y="444.3323">be treated as a sibling/tail call.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="3.38" x="16" y="462.0383">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="267.4882" x="16" y="479.7444">This style is optional, I have other programs</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="316.8232" x="16" y="497.4504">where main is more than just an argument sanitizer</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="318.1622" x="16" y="515.1564">avoiding the need to write a function in tail position.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="3.38" x="16" y="532.8624">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="258.9862" x="16" y="550.5684">At this time there is no preference of style.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="101.5561" x="16" y="568.2744">- NR. 03/05/2026</text><rect fill="#90EE90" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="195.2372" x="369.1622" y="465.3813"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="175.2372" x="379.1622" y="488.2094">return sil_write_snapshot(path)</text><ellipse cx="466.7808" cy="608.0835" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="466.7808" cy="608.0835" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="466.7808" x2="466.7808" y1="30" y2="50"/><polygon fill="#181818" points="462.7808,40,466.7808,50,470.7808,40,466.7808,44" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="374.2624" x2="374.2624" y1="193.0323" y2="228.0323"/><polygon fill="#181818" points="370.2624,218.0323,374.2624,228.0323,378.2624,218.0323,374.2624,222.0323" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="559.2993" x2="559.2993" y1="313.8674" y2="336.0233"/><polygon fill="#181818" points="555.2993,326.0233,559.2993,336.0233,563.2993,326.0233,559.2993,330.0233" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="559.2993" x2="559.2993" y1="235.6882" y2="261.1792"/><polygon fill="#181818" points="555.2993,251.1792,559.2993,261.1792,563.2993,251.1792,559.2993,255.1792" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="625.2539" x2="647.5978" y1="223.6882" y2="223.6882"/><polygon fill="#181818" points="643.5978,306.0233,647.5978,316.0233,651.5978,306.0233,647.5978,310.0233" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="647.5978" x2="647.5978" y1="223.6882" y2="385.0233"/><line style="stroke:#181818;stroke-width:1;" x1="647.5978" x2="466.7808" y1="385.0233" y2="385.0233"/><line style="stroke:#181818;stroke-width:1;" x1="466.7808" x2="466.7808" y1="385.0233" y2="465.3813"/><polygon fill="#181818" points="462.7808,455.3813,466.7808,465.3813,470.7808,455.3813,466.7808,459.3813" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="559.2993" x2="559.2993" y1="176.6882" y2="211.6882"/><polygon fill="#181818" points="555.2993,201.6882,559.2993,211.6882,563.2993,201.6882,559.2993,205.6882" style="stroke:#181818;stroke-widt