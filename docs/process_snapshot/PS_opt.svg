" font-size="12" lengthAdjust="spacing" textLength="132.3129" x="390.5492" y="1448.4955">waitpid(ld_pid, NULL, 0)</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="60.9244" x="390.5492" y="1464.8396">SYS_FAULT</text><polygon fill="#FFFF00" points="432.3078,1250.8,481.1035,1250.8,493.1035,1262.8,481.1035,1274.8,432.3078,1274.8,420.3078,1262.8,432.3078,1250.8" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="6.2919" x="460.7056" y="1286.5589">1</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="48.7957" x="432.3078" y="1267.068">st_pid &lt; 0</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="6.2919" x="493.1035" y="1259.577">0</text><rect fill="none" height="226.7885" style="stroke:#000000;stroke-width:1.5;" width="375.2965" x="275.7024" y="1573.5104"/><path d="M391.99,1573.5104 L391.99,1585.5783 L381.99,1595.5783 L275.7024,1595.5783" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="106.2876" x="278.7024" y="1589.4763">st_child_process</text><polygon fill="#FFFF00" points="374.9047,1612.5783,538.5065,1612.5783,550.5065,1624.5783,538.5065,1636.5783,374.9047,1636.5783,362.9047,1624.5783,374.9047,1612.5783" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="163.6018" x="374.9047" y="1628.8463">dup2(pfd[0], STDIN_FILENO) &lt; 0</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="6.2919" x="356.6128" y="1621.3553">1</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="6.2919" x="550.5065" y="1621.3553">0</text><rect fill="#FFB6C1" height="52.6882" rx="