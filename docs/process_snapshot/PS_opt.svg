ending TSV data into this pipe.</text><polygon fill="#FFFF00" points="369.5753,964.7353,543.836,964.7353,555.836,976.7353,543.836,988.7353,369.5753,988.7353,357.5753,976.7353,369.5753,964.7353" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="174.2607" x="369.5753" y="981.0033">dup2(pfd[1], STDOUT_FILENO) &lt; 0</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="6.2919" x="351.2833" y="973.5123">1</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="6.2919" x="555.836" y="973.5123">0</text><rect fill="#FFB6C1" height="52.6882" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="114.4046" x="142.8133" y="998.7353"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="36.2763" x="152.8133" y="1021.5634">perror</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="94.4046" x="152.8133" y="1037.9075">_exit(EXE_FAULT)</text><path d="M277.218,1001.6925 L277.218,1064.8105 L622.0092,1064.8105 L622.0092,1011.6925 L612.0092,1001.6925 L277.218,1001.6925" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M612.0092,1001.6925 L612.0092,1011.6925 L622.0092,1011.6925 L612.0092,1001.6925" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="323.7913" x="283.218" y="1020.5895">When execl runs it replaces the child process and will</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="309.5952" x="283.218" y="1038.2955">terminate on its own later. If execl doesn't succeed</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="270.5173" x="283.218" y="1056.0015">program execution will continue into a fault.</text><rect fill="#90EE90" height="69.0323" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="142.7728" x="642.0092" y="998.7353"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="69.4805" x="652.0092" y="1021.5634">close(pfd[0])</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="69.4805" x="652.0092" y="1037.9075">close(pfd[1])</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="122.7728" x="652.0092" y="1054.2516">execl(LD_BIN_PATH...)</text><rect fill="#FFB6C1" height="52.6882" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="114.4046" x="656.1933" y="1087.7677"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="36.2763" x="666.1933" y="1110.5957">perror</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="94.4046" x="666.1933" y="1126.9399">_exit(EXE_FAULT)</text><polygon fill="#FFFF00" points="428.9803,822.2904,484.4309,822.2904,496.4309,834.2904,484.4309,846.2904,428.9803,846.2904,416.9803,834.2904,428.9803,822.2904" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="6.2919" x="460.7056" y="858.0493">1</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="55.4506" x="428.9803" y="838.5584">ld_pid == 0</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="6.2919" x="496.4309" y="831.0675">0</text><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="96.3206" x="408.5454" y="1194.4559"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="76.3206" x="418.5454" y="1217.284">st_pid = fork()</text>